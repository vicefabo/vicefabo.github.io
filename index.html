<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>‎ </title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden; 
            opacity: 0;
            animation: masterFade 3s ease-out forwards;
        }

        @keyframes masterFade { to { opacity: 1; } }

        /* --- LOGO HEADER --- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 160px; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        .header img { height: 85px; width: auto; }

        /* --- SLIDESHOW CONTAINER --- */
        .slideshow-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch;
            gap: 40px; 
            padding: 0 10vw; 
        }

        .slide {
            flex: 0 0 80vw; 
            height: 100vh;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            height: 65vh; 
            width: auto;
            max-width: 100%;
            object-fit: contain;
            box-shadow: 0 30px 100px rgba(25, 24, 24, 0.789);
        }

        /* Hide scrollbars */
        .slideshow-wrapper::-webkit-scrollbar { display: none; }
        .slideshow-wrapper { scrollbar-width: none; }
    </style>
</head>
<body>


    <main class="slideshow-wrapper" id="slideshow">
        </main>

    <script>
        const slideshow = document.getElementById('slideshow');
        const totalVideos = 83;

        const createSlide = (fileName) => {
            const slide = document.createElement('div');
            slide.className = 'slide';
            slide.innerHTML = `
                <video autoplay muted loop playsinline>
                    <source src="${fileName}" type="video/mp4">
                </video>
            `;
            slideshow.appendChild(slide);
        };

        for (let i = 1; i <= totalVideos; i++) {
            createSlide(`${i}.mp4`);
            if (i === 28) createSlide('m.mp4');
        }

        // --- ARROW KEY LOGIC ---
        window.addEventListener('keydown', (e) => {
            // Width of one slide plus the gap
            const slideWidth = slideshow.querySelector('.slide').clientWidth + 40;

            if (e.key === 'ArrowRight') {
                slideshow.scrollBy({ left: slideWidth, behavior: 'smooth' });
            } 
            else if (e.key === 'ArrowLeft') {
                slideshow.scrollBy({ left: -slideWidth, behavior: 'smooth' });
            }
        });
    </script>

</body>
</html>
